<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLITICA -ポリティカ-</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <h1>POLITICA <span class="sub">ポリティカ</span></h1>
    <div id="turninfo"></div>
    <button id="rulesBtn" class="ghost">遊び方</button>
  </header>

  <div id="setup" class="panel">
    <h2>ゲーム設定</h2>
    <label>あなたの名前: <input id="pname" value="あなた" maxlength="8"></label>
    <label>対戦人数:
      <select id="pcount"><option value="2">2人</option><option value="3" selected>3人</option><option value="4">4人</option></select>
    </label>
    <p class="setup-note">勝利条件: ①どれかの思想の場の影響力が50超 ②信用20超 ③選挙で3回首班</p>
    <label><input type="checkbox" id="hotseat"> 全員人間(ホットシート)</label>
    <button id="startBtn" class="primary">ゲーム開始</button>
  </div>

  <main id="game" style="display:none">
    <section id="boardWrap">
      <div id="board"></div>
    </section>
    <aside id="side">
      <div id="players"></div>
      <div id="enacted"></div>
    </aside>
    <section id="bottom">
      <div id="decision"></div>
      <div id="hand"></div>
    </section>
    <section id="logWrap"><div id="log"></div></section>
  </main>
</div>

<div id="modal" class="modal-hidden">
  <div class="modal-box"><div id="modal-content"></div></div>
</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="ai.js"></script>
<script src="ui.js"></script>
</body>
</html>
